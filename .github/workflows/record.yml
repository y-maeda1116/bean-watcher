name: record

on:
  workflow_dispatch:
    inputs:
      action:
        description: "記録するアクション"
        required: true
        type: choice
        default: pour
        options:
          - pour
          - clean
          - buy
      cups:
        description: "杯数 (pour のみ)"
        required: false
        default: "1"
      target:
        description: "掃除対象 (clean のみ): descaling / grinder"
        required: false
        default: "descaling"
      bags:
        description: "購入袋数 (buy のみ)"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: bean-watcher
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -o bean-watcher .
      - name: Run record
        env:
          ACTION: ${{ github.event.inputs.action }}
          CUPS: ${{ github.event.inputs.cups }}
          TARGET: ${{ github.event.inputs.target }}
          BAGS: ${{ github.event.inputs.bags }}
        run: |
          case "$ACTION" in
            pour)  ./bean-watcher record pour  -cups="$CUPS" ;;
            clean) ./bean-watcher record clean -target="$TARGET" ;;
            buy)   ./bean-watcher record buy   -bags="$BAGS" ;;
          esac
      - name: Commit data
        env:
          ACTION: ${{ github.event.inputs.action }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git commit -m "chore(data): $ACTION を記録" || echo "no changes"
          git push
