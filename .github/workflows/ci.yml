name: ci

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -cover
